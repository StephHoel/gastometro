<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecionando...</title>
  <script>
    // GitHub Pages SPA routing fix
    // Salva o caminho atual antes de redirecionar para index.html
    const redirect = function () {
      if (window.location.pathname !== '/gastometro/') {
        sessionStorage.redirect = window.location.pathname + window.location.search
      }
      window.location.pathname = '/gastometro/'
    }
    redirect();
  </script>
</head>

<body>
  <p>Redirecionando...</p>
</body>

</html>
