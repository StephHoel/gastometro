<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Gastômetro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Aplicativo para gerenciar lista de compras e calcular preço por unidade" />

  <!-- Redirect com single page app para garantir que todas as rotas funcionem no GitHub Pages -->
  <script>
    (function () {
      var redirect = sessionStorage.redirect
      delete sessionStorage.redirect
      if (redirect && redirect !== location.href) {
        history.replace(redirect)
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <noscript>Você precisa ativar JavaScript para rodar este app.</noscript>
</body>

</html>
