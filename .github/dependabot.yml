version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    groups:
      expo-stack:
        patterns:
          - "expo"
          - "expo-*"
          - "react"
          - "react-dom"
          - "react-native"
          - "@react-*"
          - "@expo/*"
      app-libs:
        patterns:
          - "*"
        exclude-patterns:
          - "expo"
          - "expo-*"
          - "react"
          - "react-dom"
          - "react-native"
          - "@react-*"
          - "@expo/*"
