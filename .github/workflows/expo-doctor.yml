name: Expo Doctor

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "package.json"
      - "package-lock.json"
      - "app.json"
      - "app.config.*"
      - "eas.json"
      - ".github/dependabot.yml"
      - ".github/workflows/expo-doctor.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  expo-doctor:
    name: Run expo-doctor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Expo project health
        run: npm run deps:check
