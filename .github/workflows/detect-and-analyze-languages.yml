name: Detect Languages

on:
  workflow_call:

permissions:
  actions: read
  contents: read
  security-events: write
  packages: read

jobs:
  detect-languages:
    name: Detect Used Languages
    runs-on: ubuntu-latest
    outputs:
      run-java: ${{ steps.detect.outputs.java }}
      run-js: ${{ steps.detect.outputs.js }}
      run-swift: ${{ steps.detect.outputs.swift }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Languages Used
        id: detect
        run: |
          echo "java=false" >> $GITHUB_OUTPUT
          echo "js=false" >> $GITHUB_OUTPUT
          echo "swift=false" >> $GITHUB_OUTPUT

          if grep -rqE '\.java$|\.kt$' .; then
            echo "Java/Kotlin detected"
            echo "java=true" >> $GITHUB_OUTPUT
          fi

          if grep -rqE '\.js$|\.ts$' .; then
            echo "JavaScript/TypeScript detected"
            echo "js=true" >> $GITHUB_OUTPUT
          fi

          if find . -name "*.swift" | grep -q .; then
            echo "Swift detected"
            echo "swift=true" >> $GITHUB_OUTPUT
          fi

  # codeql-java:
  #   needs: detect-languages
  #   if: needs.detect-languages.outputs.run-java == 'true'
  #   uses: ./.github/workflows/codeql-reusable.yml
  #   with:
  #     language: java-kotlin
  #     build_mode: autobuild

  codeql-js:
    needs: detect-languages
    if: needs.detect-languages.outputs.run-js == 'true'
    uses: ./.github/workflows/codeql-reusable.yml
    with:
      language: javascript-typescript
      build_mode: none

