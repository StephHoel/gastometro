name: Build APK and Release to GitHub

on:
  push:
    branches: [ "main", "release", "releases/v1.4.0"]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  actions: read
  security-events: write
  packages: read

jobs:
  detect-languages:
    name: Detect Languages
    uses: ./.github/workflows/detect-and-analyze-languages.yml

  build:
    name: Build and Release
    needs: [detect-languages]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --loglevel=error

      - name: Prebuild Expo
        run: npx expo prebuild --non-interactive --platform android

      - name: Remove .webp files
        run: |
          echo "Removing .webp files..."
          find . -name "*.webp" -type f -delete
          echo "Files removing!"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --warning-mode none
        env:
          EXPO_NO_COMMAND: 1

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/*.apk android/app/build/outputs/apk/release/gastometro.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: gastometro
          path: android/app/build/outputs/apk/release/gastometro.apk
          if-no-files-found: error
          overwrite: true

      - name: Create or Update GitHub Release for Main Branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ github.ref_name == 'main' }}
        run: |
          CURRENT_DATETIME=$(date +"%d-%m-%Y %H:%M:%S")
          TAG="main"
          APK_PATH="android/app/build/outputs/apk/release/gastometro.apk"

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release with tag '$TAG' exists. Uploading new APK..."
            gh release upload "$TAG" "$APK_PATH" --clobber
          else
            echo "Creating new release with tag '$TAG'..."
            gh release create "$TAG" "$APK_PATH" \
              --title "Builded at $CURRENT_DATETIME" \
              --target main \
              --generate-notes
          fi

      - name: Create or Update GitHub Release for Other Branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ github.ref_name != 'main' }}
        run: |
          CURRENT_DATETIME=$(date +"%d-%m-%Y %H:%M:%S")
          TAG="dev"
          APK_PATH="android/app/build/outputs/apk/release/gastometro.apk"

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release with tag '$TAG' exists. Uploading new APK..."
            gh release upload "$TAG" "$APK_PATH" --clobber
          else
            echo "Creating new prerelease with tag '$TAG'..."
            gh release create "$TAG" "$APK_PATH" \
              --title "Builded at $CURRENT_DATETIME" \
              --target release \
              --generate-notes \
              --prerelease
          fi
