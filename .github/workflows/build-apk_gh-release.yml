name: Build APK and Release to GitHub

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  actions: read
  security-events: write
  packages: read

jobs:
  detect-languages:
    name: Detect Languages
    uses: ./.github/workflows/detect-and-analyze-languages.yml

  build:
    name: Build and Release
    needs: [detect-languages]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Run local build script
        run: |
          chmod +x scripts/build-local.sh
          ./scripts/build-local.sh

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: gastometro
          path: _apks/*.apk
          if-no-files-found: error
          overwrite: true

      - name: Create or Update GitHub Release for Main Branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ github.ref_name == 'main' }}
        run: |
          CURRENT_DATETIME=$(date +"%d-%m-%Y %H:%M:%S")
          TAG="main"
          APK_PATH=$(ls -1 _apks/*.apk 2>/dev/null | head -n1 || true)

          if [ -z "$APK_PATH" ]; then
            echo "No APK found in _apks/ to upload"
            exit 1
          fi

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release with tag '$TAG' exists. Uploading new APK..."
            gh release upload "$TAG" "$APK_PATH" --clobber
          else
            echo "Creating new release with tag '$TAG'..."
            gh release create "$TAG" "$APK_PATH" \
              --title "Builded at $CURRENT_DATETIME" \
              --target main \
              --generate-notes
          fi

      - name: Create or Update GitHub Release for Other Branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ github.ref_name != 'main' }}
        run: |
          CURRENT_DATETIME=$(date +"%d-%m-%Y %H:%M:%S")
          TAG="dev"
          APK_PATH=$(ls -1 _apks/*.apk 2>/dev/null | head -n1 || true)

          if [ -z "$APK_PATH" ]; then
            echo "No APK found in _apks/ to upload"
            exit 1
          fi

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release with tag '$TAG' exists. Uploading new APK..."
            gh release upload "$TAG" "$APK_PATH" --clobber
          else
            echo "Creating new prerelease with tag '$TAG'..."
            gh release create "$TAG" "$APK_PATH" \
              --title "Builded at $CURRENT_DATETIME" \
              --target release \
              --generate-notes \
              --prerelease
          fi
